<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Tracker - Карьерный монитор</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="auth-container" class="hidden">
        <div class="auth-box">
            <h2>Career Tracker</h2>
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>

            <form id="login-form" class="tab-content active">
                <input type="text" id="login-login" placeholder="Логин" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Войти</button>
            </form>

            <form id="register-form" class="tab-content">
                <input type="text" id="register-login" placeholder="Логин" required>
                <input type="password" id="register-password" placeholder="Пароль" required>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
            </form>

            <p id="auth-message" class="message"></p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <h1>Карьерный монитор</h1>
            <div class="user-info">
                <span id="username-display"></span>
                <button id="logout-btn" class="btn-secondary">Выйти</button>
            </div>
        </header>

        <div class="controls">
            <button id="add-application-btn" class="btn-primary">+ Добавить заявку</button>
        </div>

        <div id="kanban-board" class="kanban-board">
            <!-- Columns will be generated by JavaScript -->
        </div>
    </div>

    <!-- Modal for creating/editing application -->
    <div id="application-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Новая заявка</h2>
            <form id="application-form">
                <input type="hidden" id="application-id">
                <div class="form-group">
                    <label for="company-name">Компания *</label>
                    <input type="text" id="company-name" required>
                </div>
                <div class="form-group">
                    <label for="vacancy-url">Ссылка на вакансию</label>
                    <input type="url" id="vacancy-url">
                </div>
                <div class="form-group">
                    <label for="contacts">Контакты</label>
                    <textarea id="contacts" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="comments">Комментарии</label>
                    <textarea id="comments" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="status">Статус</label>
                    <select id="status">
                        <option value="created">Создана</option>
                        <option value="hr_interview">HR собеседование</option>
                        <option value="tech_interview">Техническое собеседование</option>
                        <option value="director_interview">Собеседование с директором</option>
                        <option value="offer">Оффер</option>
                        <option value="rejected">Отказ</option>
                        <option value="archived">Архив</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn-secondary">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for logout confirmation -->
    <div id="logout-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Подтверждение выхода</h2>
            <p>Вы действительно хотите выйти?</p>
            <div class="form-actions">
                <button type="button" id="cancel-logout-btn" class="btn-secondary">Отмена</button>
                <button type="button" id="confirm-logout-btn" class="btn-primary">Выйти</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
