<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администрирование - Career Tracker</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body class="admin-page">
    <!-- ====== APP ====== -->
    <div id="app-container">
        <header class="app-header">
            <h1>Администрирование</h1>
            <div class="header-right">
                <span id="username-display" class="username-display"></span>
                <a href="/" class="btn-home">🏠 На главную</a>
                <button id="logout-btn" class="logout-btn">Выйти</button>
            </div>
        </header>

        <div class="toolbar">
            <div class="search-wrapper">
                <input type="text" id="search-input" class="search-input" placeholder="Поиск по логину..." autocomplete="off">
                <button id="search-clear-btn" class="search-clear-btn hidden">&times;</button>
            </div>
            <span id="user-count" class="visible-count">0</span>
        </div>

        <div class="main-content">
            <div class="admin-table-wrapper">
                <table id="users-table" class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th data-sort-field="login" class="sortable">Логин</th>
                            <th data-sort-field="created_at" class="sortable">Дата создания</th>
                            <th data-sort-field="application_count" class="sortable">Отклики</th>
                            <th data-sort-field="is_admin" class="sortable">Админ</th>
                            <th>Действия</th>
                            <th id="admin-actions-col" class="hidden">Управление</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <!-- Rows rendered by JS -->
                    </tbody>
                </table>
                <div id="empty-state" class="empty-state hidden">
                    <p>Пользователи не найдены</p>
                </div>
                <div id="pagination" class="pagination hidden">
                    <button id="pagination-prev" class="pagination-btn btn-secondary">← Назад</button>
                    <span id="pagination-info" class="pagination-info"></span>
                    <button id="pagination-next" class="pagination-btn btn-secondary">Вперёд →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== Toggle Admin Confirmation Modal ====== -->
    <div id="toggle-admin-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="toggle-admin-modal-title">Подтверждение действия</h2>
                <button type="button" class="close-modal">&times;</button>
            </div>
            <div class="modal-body toggle-admin-modal-body">
                <p id="toggle-admin-modal-text"></p>
            </div>
            <div class="modal-footer">
                <button type="button" id="cancel-toggle-admin-btn" class="btn-cancel">Отмена</button>
                <button type="button" id="confirm-toggle-admin-btn" class="btn-save">Подтвердить</button>
            </div>
        </div>
    </div>

    <!-- ====== Logout Confirmation Modal ====== -->
    <div id="logout-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Подтверждение выхода</h2>
                <button type="button" class="close-modal">&times;</button>
            </div>
            <div class="modal-body logout-modal-body">
                <p>Вы действительно хотите выйти?</p>
            </div>
            <div class="modal-footer">
                <button type="button" id="cancel-logout-btn" class="btn-cancel">Отмена</button>
                <button type="button" id="confirm-logout-btn" class="btn-save">Выйти</button>
            </div>
        </div>
    </div>

    <!-- ====== Delete Confirmation Modal ====== -->
    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Подтверждение удаления</h2>
                <button type="button" class="close-modal">&times;</button>
            </div>
            <div class="modal-body delete-modal-body">
                <p>Вы действительно хотите удалить пользователя <strong id="delete-user-name"></strong>?</p>
                <p class="warning">Это действие невозможно отменить</p>
            </div>
            <div class="modal-footer">
                <button type="button" id="cancel-delete-btn" class="btn-cancel">Отмена</button>
                <button type="button" id="confirm-delete-btn" class="btn-danger">Удалить</button>
            </div>
        </div>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <script src="/static/js/config.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
